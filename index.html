<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K18 – Amazon AU Onboarding Status</title>
  <style>
    :root {
      --bg: #0B1524;
      --surface: #112035;
      --surface2: #19304A;
      --border: #243D5A;
      --text: #EFF4FA;
      --muted: #7A9BBE;
      --complete: #22C55E;
      --inprogress: #3B82F6;
      --blocked: #EF4444;
      --pending: #64748B;
      --accent: #6D28D9;
      --accent2: #8B5CF6;
      --accent3: #A78BFA;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #110B2E 0%, #0D1E38 60%, #0B1524 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .brand-logo {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .brand-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .brand-name span { color: var(--accent3); }
    .header-center { text-align: center; flex: 1; }
    .header-center h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff 40%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-center p { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .header-meta {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 140px;
    }
    .header-meta strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }

    /* ── MAIN ── */
    main { padding: 28px 40px 48px; max-width: 1440px; margin: 0 auto; }

    /* ── SUMMARY ROW ── */
    .summary {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      flex: 1;
      min-width: 280px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .progress-number {
      font-size: 52px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      flex-shrink: 0;
    }
    .progress-detail { flex: 1; }
    .progress-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
    .progress-track {
      background: var(--bg);
      border-radius: 999px;
      height: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-count { font-size: 13px; color: var(--muted); margin-top: 8px; }
    .progress-count strong { color: var(--text); }

    .stats-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 110px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 12px 12px 0 0;
    }
    .stat-card.complete::before { background: var(--complete); }
    .stat-card.inprogress::before { background: var(--inprogress); }
    .stat-card.blocked::before { background: var(--blocked); }
    .stat-card.pending::before { background: var(--pending); }
    .stat-num {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }
    .stat-card.complete .stat-num { color: var(--complete); }
    .stat-card.inprogress .stat-num { color: var(--inprogress); }
    .stat-card.blocked .stat-num { color: var(--blocked); }
    .stat-card.pending .stat-num { color: var(--pending); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── SECTION GRID ── */
    .sections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
    }
    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .section-card:hover { border-color: #3A5578; }

    .section-header {
      padding: 16px 20px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-info {}
    .section-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .section-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .status-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-complete { background: rgba(34,197,94,0.12); color: var(--complete); border: 1px solid rgba(34,197,94,0.25); }
    .badge-inprogress { background: rgba(59,130,246,0.12); color: var(--inprogress); border: 1px solid rgba(59,130,246,0.25); }
    .badge-blocked { background: rgba(239,68,68,0.12); color: var(--blocked); border: 1px solid rgba(239,68,68,0.25); }
    .badge-pending { background: rgba(100,116,139,0.12); color: var(--pending); border: 1px solid rgba(100,116,139,0.25); }

    .mini-bar {
      height: 3px;
      background: var(--bg);
    }
    .mini-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent3));
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }

    .task-list { padding: 4px 0; }
    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 20px;
      border-bottom: 1px solid rgba(36,61,90,0.5);
      font-size: 13px;
      transition: background 0.15s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: rgba(255,255,255,0.02); }

    .check-icon {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid;
    }
    .check-icon.done {
      border-color: var(--complete);
      background: rgba(34,197,94,0.12);
    }
    .check-icon.done svg { display: block; }
    .check-icon.todo {
      border-color: var(--border);
    }
    .check-icon.todo svg { display: none; }
    .check-icon svg {
      width: 9px;
      height: 9px;
      stroke: var(--complete);
      stroke-width: 3;
      fill: none;
    }
    .task-name {
      flex: 1;
      line-height: 1.4;
      color: var(--text);
    }
    .task-name.done {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: rgba(122,155,190,0.5);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }
    footer strong { color: var(--text); }

    /* ── LOADING / ERROR ── */
    .state-message {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-icon { font-size: 32px; margin-bottom: 12px; }
    .error-hint { font-size: 13px; margin-top: 8px; max-width: 440px; margin-left: auto; margin-right: auto; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      header { padding: 16px 20px; flex-wrap: wrap; }
      .header-center { order: -1; width: 100%; text-align: left; }
      main { padding: 20px; }
      .sections-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .summary { flex-direction: column; }
      .stats-group { display: grid; grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="brand-logo">P</div>
    <div class="brand-name"><span>Pattern</span> × K18</div>
  </div>
  <div class="header-center">
    <h1>Amazon AU Onboarding</h1>
    <p>Live Status Dashboard &middot; Phase 1</p>
  </div>
  <div class="header-meta">
    <strong id="refreshTime">Loading&hellip;</strong>
    <span>Auto-refreshes every 60s</span>
  </div>
</header>

<main>
  <div id="app">
    <div class="state-message">
      <div class="spinner"></div>
      <p>Fetching progress from Google Sheets&hellip;</p>
    </div>
  </div>
</main>

<footer>
  <strong>Powered by Pattern</strong> &nbsp;&middot;&nbsp; K18 &times; Amazon Australia &nbsp;&middot;&nbsp; Onboarding Phase 1
</footer>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmG3jbbV9GYHj4iek00aGvmVMpXRJmEO5i4I_Cahgiq8KV23QPUZWdpnQKZfu6dz6PMt5pYvG0xRTC/pub?gid=0&single=true&output=csv';

  // ── CSV PARSER ───────────────────────────────────────────────
  function parseCSV(raw) {
    const rows = [];
    const lines = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    for (const line of lines) {
      const row = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      row.push(cur.trim());
      rows.push(row);
    }
    return rows;
  }

  // ── STATUS HELPERS ───────────────────────────────────────────
  function normaliseStatus(s) {
    if (!s) return 'pending';
    const t = s.toLowerCase().replace(/\s+/g,'');
    if (t === 'complete' || t === 'completed') return 'complete';
    if (t === 'inprogress')  return 'inprogress';
    if (t === 'blocked')     return 'blocked';
    return 'pending';
  }

  function statusLabel(key) {
    return { complete:'Complete', inprogress:'In Progress', blocked:'Blocked', pending:'Pending' }[key] || 'Pending';
  }

  function badgeClass(key) {
    return { complete:'badge-complete', inprogress:'badge-inprogress', blocked:'badge-blocked', pending:'badge-pending' }[key] || 'badge-pending';
  }

  // ── RENDER ───────────────────────────────────────────────────
  function render(rows) {
    // Skip header row
    const data = rows.slice(1).filter(r => r[0] && r[1]);

    // Build section map preserving order
    const sectionMap = new Map();
    for (const row of data) {
      const name   = row[0];
      const task   = row[1];
      const done   = (row[2] || '').toUpperCase() === 'TRUE';
      const status = row[3] || '';

      if (!sectionMap.has(name)) {
        sectionMap.set(name, { name, status: '', tasks: [] });
      }
      const sec = sectionMap.get(name);
      if (status) sec.status = status;
      sec.tasks.push({ name: task, done });
    }

    const sections = [...sectionMap.values()];

    // Overall stats
    const totalTasks = sections.reduce((a, s) => a + s.tasks.length, 0);
    const totalDone  = sections.reduce((a, s) => a + s.tasks.filter(t => t.done).length, 0);
    const pct        = totalTasks ? Math.round((totalDone / totalTasks) * 100) : 0;

    let cComplete = 0, cInProgress = 0, cBlocked = 0, cPending = 0;
    for (const sec of sections) {
      const k = normaliseStatus(sec.status);
      if (k === 'complete')   cComplete++;
      else if (k === 'inprogress') cInProgress++;
      else if (k === 'blocked')    cBlocked++;
      else                         cPending++;
    }

    // Build HTML
    document.getElementById('app').innerHTML = `
      <div class="summary">
        <div class="progress-card">
          <div class="progress-number">${pct}%</div>
          <div class="progress-detail">
            <div class="progress-label">Overall Progress</div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-count"><strong>${totalDone} of ${totalTasks}</strong> tasks completed</div>
          </div>
        </div>

        <div class="stats-group">
          <div class="stat-card complete">
            <div class="stat-num">${cComplete}</div>
            <div class="stat-label">Complete</div>
          </div>
          <div class="stat-card inprogress">
            <div class="stat-num">${cInProgress}</div>
            <div class="stat-label">In Progress</div>
          </div>
          <div class="stat-card blocked">
            <div class="stat-num">${cBlocked}</div>
            <div class="stat-label">Blocked</div>
          </div>
          <div class="stat-card pending">
            <div class="stat-num">${cPending}</div>
            <div class="stat-label">Pending</div>
          </div>
        </div>
      </div>

      <div class="sections-grid">
        ${sections.map(sec => {
          const k       = normaliseStatus(sec.status);
          const secDone = sec.tasks.filter(t => t.done).length;
          const secPct  = sec.tasks.length ? Math.round((secDone / sec.tasks.length) * 100) : 0;
          return `
            <div class="section-card">
              <div class="section-header">
                <div class="section-info">
                  <div class="section-name">${esc(sec.name)}</div>
                  <div class="section-sub">${secDone} of ${sec.tasks.length} tasks done</div>
                </div>
                <span class="status-badge ${badgeClass(k)}">${statusLabel(k)}</span>
              </div>
              <div class="mini-bar"><div class="mini-bar-fill" style="width:${secPct}%"></div></div>
              <div class="task-list">
                ${sec.tasks.map(t => `
                  <div class="task-row">
                    <div class="check-icon ${t.done ? 'done' : 'todo'}">
                      <svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg>
                    </div>
                    <span class="task-name ${t.done ? 'done' : ''}">${esc(t.name)}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;

    // Timestamp
    const now = new Date();
    document.getElementById('refreshTime').textContent =
      now.toLocaleString('en-AU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── FETCH ────────────────────────────────────────────────────
  async function load() {
    try {
      const res = await fetch(CSV_URL + '&nocache=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      render(parseCSV(text));
    } catch (err) {
      document.getElementById('app').innerHTML = `
        <div class="state-message">
          <div class="error-icon">⚠️</div>
          <p>Could not load data from Google Sheets.</p>
          <p class="error-hint">
            Make sure the spreadsheet is shared as <strong style="color:#EFF4FA">"Anyone with the link can view"</strong>,
            then refresh this page.
          </p>
          <p class="error-hint" style="margin-top:8px;font-size:11px;opacity:0.6">${err.message}</p>
        </div>
      `;
      document.getElementById('refreshTime').textContent = 'Failed to load';
    }
  }

  // ── INIT ─────────────────────────────────────────────────────
  load();
  setInterval(load, 60_000);   // refresh every 60 seconds
</script>
</body>
</html>
